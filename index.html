<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хувийн санхүү бүртгэл</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="roboto-regular">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm p-4 rounded-4">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4 fw-bold text-success"><i class="fa-brands fa-cash-app text-warning"></i>Хувийн санхүү бүртгэл</h3>
                        <p class="text-muted text-center small mb-4">Нэвтрэх эсвэл шинээр бүртгүүлэх</p>
                        <form id="auth-form">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Имэйл хаяг</label>
                                <input type="email" class="form-control form-control-lg" id="email" required placeholder=".........@........com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold">Нууц үг</label>
                                <input type="password" class="form-control form-control-lg" id="password" required placeholder="********">
                            </div>  
                            <div class="d-grid gap-2">                        
                                <button type="submit" id="ntm-login" class="btn btn-success btn-lg fw-semibold">Нэвтрэх</button>
                                <button type="button" id="btn-register" class="btn btn-outline-secondary">Шинээр бүртгүүлэх</button>
                            </div>  
                        </form>
                        <div id="message" class="text-danger text-center small mt-3 fw-medium"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/3789a6ee45.js" crossorigin="anonymous"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
